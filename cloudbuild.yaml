substitutions:
  _REGION: europe-west1
  _REPO: carstudio
  _SERVICE: carstudio-reels

steps:
  # 0. Önceki imajı çek → katman cache (npm ci / apt / değişmeyen adımlar hızlanır)
  - name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - docker pull ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/app:latest || true

  # 1. Docker image oluştur
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --cache-from
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/app:latest
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/app:latest
      - .

  # 2. Artifact Registry'e gönder
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/app:latest

  # 3. Cloud Run'a deploy et
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/app:latest
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --memory=8Gi
      - --cpu=8
      - --timeout=3600
      - --concurrency=1
      - --min-instances=1
      - --max-instances=3
      - --update-env-vars=CLOUD_RUN_SERVICE_URL=https://carstudio-reels-7sp57p6szq-ew.a.run.app

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/app:latest

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
